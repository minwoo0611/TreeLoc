# Default TreeLoc configuration.
# These values preserve the current baseline result on oxford_single_evo.

# Dataset directory. A CLI dataset path overrides this value.
dataset_root: oxford_single_evo

# Evaluation and retrieval thresholds.
spatial_threshold: 10.0
recall_k: 1
histogram_k: 100
knn_k: 10

# Triangle descriptor construction.
min_dist: 2.0
max_dist: 30.0
delta_l: 0.1
rho: 100007
hash_modulus: 50000000

# Tree filtering and radius histogram bins.
number_of_cluster: 30
min_radius: 0.0
max_radius: 0.8
total_section: 8
bin_width: 0.15

# Distance ranges used for the radial histogram.
# These parameters generate:
# [0, 7], [5, 13], [11, 19], [17, 25], [23, 30]
spatial_bin_interval: 6.0
spatial_bin_padding: 1.0
spatial_bin_count: 5
spatial_bin_min: 0.0
spatial_bin_max: 30.0
